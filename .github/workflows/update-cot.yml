name: Update COT Data

on:
  schedule:
    # 周一至周五 UTC 22:00（纽交所收盘后约 2h，CME 库存报告当日更新）
    - cron: '0 22 * * 1-5'
    # 周六 UTC 18:00 更新 COT（CFTC 周五发布）
    - cron: '0 18 * * 6'
  workflow_dispatch:  # 允许手动触发

permissions:
  contents: write

jobs:
  update-cot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install requests curl_cffi

      - name: Run fetch_cot.py
        run: python fetch_cot.py

      - name: Run fetch_gold.py
        run: python fetch_gold.py

      - name: Run fetch_stocks.py
        run: python fetch_stocks.py
        continue-on-error: true

      - name: Commit and push if data changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/cot.json data/gold_price.json
          git add data/stocks.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            DATE=$(python -c "import json; d=json.load(open('data/cot.json')); print(d['latest']['date'])")
            git commit -m "data: COT+金价+库存数据更新 ${DATE}"
            git push
          fi
