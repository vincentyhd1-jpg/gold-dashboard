name: Update COT Data

on:
  schedule:
    # 每周六 UTC 18:00（北京时间周日凌晨 2:00，CFTC 通常周五收盘后发布）
    - cron: '0 18 * * 6'
  workflow_dispatch:  # 允许手动触发

permissions:
  contents: write

jobs:
  update-cot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run fetch_cot.py
        run: python fetch_cot.py

      - name: Commit and push if data changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/cot.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            DATE=$(python -c "import json; d=json.load(open('data/cot.json')); print(d['latest']['date'])")
            git commit -m "data: COT 数据更新 ${DATE}"
            git push
          fi
