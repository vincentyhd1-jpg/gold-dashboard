<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <!-- Background gradient: deep charcoal to dark navy -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1f2e"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <!-- Gold gradient for the D letterform -->
    <linearGradient id="gold" x1="0" y1="0" x2="0.6" y2="1">
      <stop offset="0%"   stop-color="#ffe082"/>
      <stop offset="40%"  stop-color="#f5c842"/>
      <stop offset="75%"  stop-color="#d4970a"/>
      <stop offset="100%" stop-color="#b8740a"/>
    </linearGradient>
    <!-- Subtle inner highlight on the D -->
    <linearGradient id="highlight" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#fff8e1" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#fff8e1" stop-opacity="0"/>
    </linearGradient>
    <!-- Glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Clip for rounded square -->
    <clipPath id="roundclip">
      <rect width="64" height="64" rx="14" ry="14"/>
    </clipPath>
  </defs>

  <!-- Background rounded square -->
  <rect width="64" height="64" rx="14" ry="14" fill="url(#bg)"/>

  <!-- Subtle top-left corner accent line -->
  <line x1="10" y1="0" x2="0" y2="10" stroke="#f5c842" stroke-width="0.6" stroke-opacity="0.25" clip-path="url(#roundclip)"/>

  <!-- ── The D letterform ──
       Built from a geometric slab: vertical stroke + curved bowl.
       The top-right corner of the D is cut at 45° for a modern edge. -->
  <g filter="url(#glow)">
    <!-- Main D shape: custom path -->
    <!-- Stem (left vertical bar) -->
    <rect x="13" y="13" width="9" height="38" rx="1.5" fill="url(#gold)"/>

    <!-- Bowl: a right-facing curved half using a path -->
    <!-- Top horizontal bar -->
    <rect x="13" y="13" width="25" height="7.5" rx="1.5" fill="url(#gold)"/>
    <!-- Bottom horizontal bar -->
    <rect x="13" y="43.5" width="25" height="7.5" rx="1.5" fill="url(#gold)"/>
    <!-- Right curved edge of bowl — filled arc region -->
    <path d="M 22 20.5
             L 38 20.5
             Q 52 20.5 52 32
             Q 52 43.5 38 43.5
             L 22 43.5
             Z"
          fill="url(#gold)"/>

    <!-- Cutout — hollow center of the D -->
    <path d="M 22 24
             L 36 24
             Q 46.5 24 46.5 32
             Q 46.5 40 36 40
             L 22 40
             Z"
          fill="url(#bg)"/>

    <!-- Geometric chamfer cut on top-right of D (design accent) -->
    <polygon points="36,13 43,13 50,20 50,20.5 38,20.5 36,20.5"
             fill="url(#bg)"/>
    <!-- Re-draw the chamfer in gold as a thin diagonal edge line -->
    <line x1="36" y1="13" x2="50" y2="20.5"
          stroke="url(#gold)" stroke-width="1.2" stroke-linecap="round"/>
  </g>

  <!-- Highlight sheen on left side of D -->
  <rect x="13" y="13" width="9" height="38" rx="1.5" fill="url(#highlight)"/>

  <!-- Small ascending trend spark in bottom-right corner -->
  <polyline points="44,52 48,47 52,49.5 56,44"
            fill="none" stroke="#f5c842" stroke-width="1.6"
            stroke-linecap="round" stroke-linejoin="round"
            stroke-opacity="0.7"
            clip-path="url(#roundclip)"/>
  <!-- Arrow tip -->
  <polyline points="54,43.2 56,44 54.8,45.8"
            fill="none" stroke="#f5c842" stroke-width="1.6"
            stroke-linecap="round" stroke-linejoin="round"
            stroke-opacity="0.7"
            clip-path="url(#roundclip)"/>
</svg>
